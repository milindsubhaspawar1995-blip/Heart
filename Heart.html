<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Well Soon</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Flowers */
.flower{
    position:absolute;
    font-size:70px;
}

.top-left{
    top:20px;
    left:20px;
}

.top-right{
    top:20px;
    right:20px;
}

.bottom-left{
    bottom:20px;
    left:20px;
}

.bottom-right{
    bottom:20px;
    right:20px;
}

.card{
    text-align:center;
    padding:40px;
    max-width:600px;
}

.message{
    font-size:32px;
    line-height:1.6;
    color:#444;
}
</style>
</head>

<body>

<div class="flower top-left">🌸</div>
<div class="flower top-right">🌺</div>
<div class="flower bottom-left">🌷</div>
<div class="flower bottom-right">🌹</div>

<div class="card">
    <div class="message">
        स्वतःची काळजी घे. <br>
        तू लवकर बरी व्हावीस अशी मनापासून इच्छा आहे. <br>
        आराम कर आणि छान झोप घे. 💖
    </div>
</div>

</body>
</html>
